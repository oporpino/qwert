name: Bump recipes version

on:
  push:
    branches: [main]
    paths:
      - 'recipes/**'
      - '!recipes/VERSION'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update VERSION
        run: date -u +%Y%m%d%H%M%S > recipes/VERSION

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recipes/VERSION
          git commit -m "chore: bump recipes version"
          git push
