name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v5

      - name: Set version from tag
        run: sed -i'' "s/^version = .*/version = \"${GITHUB_REF_NAME#v}\"/" Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: qwert-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/qwert

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      - name: Flatten binaries
        run: |
          mkdir dist
          for dir in artifacts/qwert-*/; do
            target="${dir#artifacts/qwert-}"
            target="${target%/}"
            mv "${dir}qwert" "dist/qwert-${target}"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          make_latest: true
          files: dist/qwert-*

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force
