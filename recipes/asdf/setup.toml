dest = "~/.qwert/hooks/init/asdf.sh"

# macOS: oh-my-zsh asdf plugin handles shell integration (add asdf to plugins list).
# Debian: writes shell fragment to ~/.qwert/hooks/init/ — sourced automatically by qwert hook init.
debian = [
  "mkdir -p ~/.qwert/hooks/init",
  "printf '. \"$HOME/.asdf/asdf.sh\"\\n. \"$HOME/.asdf/completions/asdf.bash\"\\n' > ~/.qwert/hooks/init/asdf.sh"
]

[undo]
debian = "rm -f ~/.qwert/hooks/init/asdf.sh"
