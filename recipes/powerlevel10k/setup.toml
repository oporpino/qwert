to = "~/.local/share/qwert/hooks/init/powerlevel10k.sh"

# Writes shell fragment to ~/.local/share/qwert/hooks/init/ — sourced automatically by qwert hook init.
# Also symlinks ~/.p10k.zsh from your config dir (~/.qwert/p10k.zsh).
macos = [
  "mkdir -p ~/.local/share/qwert/hooks/init",
  "printf 'source \"$(brew --prefix)/share/powerlevel10k/powerlevel10k.zsh-theme\"\\n[[ ! -f ~/.p10k.zsh ]] || source ~/.p10k.zsh\\n' > ~/.local/share/qwert/hooks/init/powerlevel10k.sh",
  "ln -sf ~/.qwert/p10k.zsh ~/.p10k.zsh"
]

[undo]
macos = [
  "rm -f ~/.local/share/qwert/hooks/init/powerlevel10k.sh",
  "rm -f ~/.p10k.zsh"
]
