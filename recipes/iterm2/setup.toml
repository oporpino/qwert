dest = "~/.config/qwert/iterm2"
macos = [
  "defaults write com.googlecode.iterm2 PrefsCustomFolder -string ~/.config/qwert/iterm2",
  "defaults write com.googlecode.iterm2 LoadPrefsFromCustomFolder -bool true",
]

[undo]
macos = [
  "defaults delete com.googlecode.iterm2 PrefsCustomFolder",
  "defaults delete com.googlecode.iterm2 LoadPrefsFromCustomFolder",
]
