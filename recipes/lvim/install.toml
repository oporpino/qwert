[meta]
name = "lvim"
version = "1.0.0"
description = "LunarVim — an IDE layer for Neovim"
type = "qwert"
depends = ["neovim"]

[check]
command = "lvim"
version_flag = "--version"

[install]
macos = 'LV_BRANCH="release-1.3/neovim-0.9" bash <(curl -s https://raw.githubusercontent.com/LunarVim/LunarVim/release-1.3/neovim-0.9/utils/installer/install.sh)'

[uninstall]
macos = 'bash <(curl -s https://raw.githubusercontent.com/LunarVim/LunarVim/release-1.3/neovim-0.9/utils/installer/uninstall.sh)'
